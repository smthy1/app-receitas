<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🍽️</text></svg>">
</head>

<body class="bg-gray-100">
    <!--Header-->
    <header class="flex justify-between items-center bg-blue-500 text-white p-7">
        <h1 class="italic text-2xl font-Poppins font">🍽️ Receitas Rápidas</h1>       
    </header>
    <!--Bloco da busca-->
    <div>
        <section class="max-w-4xl mx-auto rounded-xl border 
        border-gray-200 bg-gradient-to-r from-white via-gray-50 to-white shadow-xl p-16 mt-8 hover:shadow-2xl transition-shadow duration-300">
            <h1 class="flex justify-center py-10 text-3xl font-poppins font-semibold text-gray-800">
                Buscador de Receitas
            </h1>
            <h2 class="flex justify-center p-6 text-xl font-poppins text-gray-700">
                Digite o nome do prato que deseja buscar a receita
            </h2>
            <section class="flex max-w-md mx-auto">
                <input id="nome" placeholder="Ex: Chicken Handi" class="w-96 px-4 py-3 border border-gray-300 
                rounded-l-md focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                <button id="search-btn" onclick="search()" class="bg-blue-600 text-white px-6 py-3 
                rounded-r-md hover:bg-blue-700 hover:scale-105 transition-transform duration-200">
                    Buscar
                </button>
            </section>
            <h3 class="flex justify-center pt-7 text-base font-poppins font-semibold text-gray-600">OU</h3>
            <section class="flex justify-center max-w-md mx-auto pt-10">
                <h2 class="pr-4 text-xl font-poppins text-gray-700">Me recomende uma receita</h2>
                <button id="search-btn" onclick="aleatorio()"class="bg-blue-600 text-white px-4 h-9 rounded-full 
                hover:bg-blue-700 hover:scale-105 transition-transform duration-200">
                    Gerar
                </button>
            </section>
        </section>
    </div>
    <div class="flex justify-center mt-20" style="font-family: Poppins; font-size: 20px;" id="result"></div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="api.js"></script>
</body>
</html>
